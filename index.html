<style>
:root{
  --bg:#f0f4f8;--surf:#ffffff;--surf2:#f8fafc;--surf3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --water:#0284c7;--elec:#d97706;--rent:#7c3aed;
  --ok:#059669;--warn:#ea580c;--danger:#dc2626;
  --text:#0f172a;--muted:#64748b;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;
  -webkit-tap-highlight-color:transparent}
/* ลบ radial gradient overlay ออก — กิน GPU ตอน scroll */
#screen-login{display:flex;align-items:center;justify-content:center;padding:20px;
  position:fixed;inset:0;z-index:100;background:var(--bg)}
#screen-login.hidden{display:none}
#screen-bill{display:none;position:relative;z-index:1;min-height:100vh}
.login-box{background:var(--surf);border:1px solid var(--border);border-radius:24px;
  padding:36px 28px;max-width:380px;width:100%;animation:fadeUp .4s ease both;
  box-shadow:0 4px 16px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.login-logo p{font-size:13px;color:var(--muted)}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em}
input,select{background:var(--surf2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;padding:11px 14px;
  outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--water);box-shadow:0 0 0 2px rgba(2,132,199,.1)}
input::placeholder{color:var(--muted)}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-bottom:10px;
  background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:9px;padding:9px;display:none}
.login-note{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.7}
.btn{padding:11px 20px;border-radius:11px;border:none;font-family:'Prompt',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;
  display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-ghost{background:var(--surf2);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surf3)}
.btn-full{width:100%}
.btn:active{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* topbar: ลบ backdrop-filter (กิน GPU บน Android), ใช้ solid bg แทน */
.topbar{background:#fff;
  border-bottom:1px solid var(--border);padding:0 16px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50}
.topbar-room{font-family:'Prompt',sans-serif;font-size:14px;font-weight:800;color:var(--water)}
.topbar-name{font-size:12px;color:var(--muted)}
.btn-logout{border:1px solid rgba(220,38,38,.3);color:#dc2626;cursor:pointer;
  font-size:12px;padding:5px 12px;border-radius:7px;
  font-family:'Sarabun',sans-serif;background:rgba(220,38,38,.05)}
.btn-logout:hover{background:rgba(220,38,38,.1)}
.notif-banner{background:#eff6ff;border-bottom:2px solid #bfdbfe;padding:12px 16px;
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#1d4ed8;
  cursor:pointer;animation:slideDown .3s ease}
.conn-banner{background:#fef2f2;border-bottom:2px solid #fecaca;padding:10px 16px;
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#991b1b}
.content{max-width:520px;margin:0 auto;padding:14px 14px 60px}
.month-selector{background:var(--surf);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.month-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surf2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:'Prompt',sans-serif;white-space:nowrap}
.month-tab:hover{border-color:var(--water);color:var(--water)}
.month-tab.active{background:#eff6ff;border-color:var(--water);color:var(--water)}
.month-tab.has-pending{border-color:var(--elec);color:var(--elec);background:#fffbeb}
.load-more{margin-top:8px;width:100%;padding:8px;background:var(--surf2);border:1px dashed var(--border2);
  border-radius:10px;color:var(--muted);font-size:12px;font-family:'Prompt',sans-serif;cursor:pointer}
.load-more:hover{background:var(--surf3);color:var(--text)}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cdot{width:8px;height:8px;border-radius:50%}
.card-title{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700}
.amt-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--surf2);border:1px solid var(--border)}
.al{display:flex;flex-direction:column;gap:2px}
.an{font-size:13px;font-weight:600}.ad{font-size:11px;color:var(--muted)}
.ap{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700}
.ap.w{color:var(--water)}.ap.e{color:var(--elec)}.ap.r{color:var(--rent)}.ap.f{color:var(--danger)}
.grand-row{display:flex;justify-content:space-between;align-items:center;padding:13px;
  background:#f0f9ff;
  border:1px solid rgba(2,132,199,.2);border-radius:12px;margin-top:10px}
.gl{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700}
/* gradient text เปลี่ยนเป็นสีเดียว — gradient text บังคับ paint ทั้ง element ตอน scroll */
.ga{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;color:var(--water)}
.bill-hero{text-align:center;padding:24px 16px 16px}
.hero-month{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-family:'Prompt',sans-serif;font-size:48px;font-weight:800;line-height:1;color:var(--water)}
.hero-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:700;margin-top:10px;border:1px solid}
.hp-pending{background:#fffbeb;border-color:#fde68a;color:#92400e}
.hp-partial{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.hp-paid{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.hp-confirmed{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.remaining-box{border-radius:12px;padding:13px;margin-top:10px;
  display:flex;justify-content:space-between;align-items:center;background:#fef2f2;border:1px solid #fecaca}
.remaining-box.done{background:#f0fdf4;border-color:#bbf7d0}
.qr-img{max-width:180px;max-height:180px;border-radius:12px;border:2px solid var(--border);
  object-fit:contain;background:#fff;padding:6px;display:block;margin:0 auto}
.bank-box{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:13px}
.brow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.bk{color:var(--muted)}.bv{font-weight:700}
.bank-num{font-family:'Prompt',sans-serif;font-size:22px;font-weight:800;
  color:var(--elec);letter-spacing:.06em;text-align:center;padding:8px 0 4px}
.copy-btn{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:8px;
  color:var(--elec);font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;
  width:100%;margin-top:8px;font-family:'Sarabun',sans-serif}
.copy-btn:active{background:rgba(217,119,6,.15)}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;
  cursor:pointer;background:var(--surf2)}
.upload-zone.has{border-color:rgba(5,150,105,.5)}
/* รูปสลิป + QR: บังคับ contain ที่ size เล็ก ลด memory ตอน scroll */
.upload-preview{max-width:100%;border-radius:10px;margin-top:10px;max-height:200px;object-fit:contain}
.ph-item{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:8px;
  contain:content}
.ph-item img{content-visibility:auto;contain-intrinsic-size:auto 160px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:18px;font-size:10px;font-weight:700;border:1px solid}
.pv{background:#f0fdf4;border-color:#bbf7d0;color:#166634}
.pp{background:#f5f3ff;border-color:#ddd6fe;color:#5b21b6}
.pr{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
/* ลด animation บนเครื่อง prefers-reduced-motion + Android เก่า */
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
@media print{
  @page{size:A4 portrait;margin:12mm}
  body>*:not(#receiptModal){display:none!important}
  #receiptModal{display:block!important;position:static!important;background:#fff!important;padding:0!important}
  .receipt-box{box-shadow:none!important;border:none!important;max-width:100%!important;border-radius:0!important}
  .no-print{display:none!important}
  .rc-header{flex-direction:column!important}
  .rc-header-right{text-align:left!important;border-top:1px dashed #ccc!important;padding-top:8px!important;width:100%!important}
  .rc-body{flex-direction:column!important}
  .rc-sig{width:100%!important;border-left:none!important;border-top:1px dashed #ccc!important;padding-left:0!important;padding-top:12px!important;margin-top:8px!important}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">
      <div style="display:flex;justify-content:center;margin-bottom:12px">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0f172a,#1e293b);
          display:flex;align-items:center;justify-content:center;
          font-family:'Prompt',sans-serif;font-size:22px;font-weight:800;color:#fff;
          box-shadow:0 6px 20px rgba(15,23,42,.25);border:2px solid #e2e8f0">JR</div>
      </div>
      <h1>ระบบหอพัก</h1>
      <p>เข้าสู่ระบบเพื่อดูบิลค่าสาธารณูปโภค</p>
    </div>
    <div class="fg">
      <label>เบอร์โทรศัพท์</label>

    <div class="fg">

    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">🔐 เข้าสู่ระบบ</button>
    <div class="login-note">ใช้เบอร์โทรและเลขห้อง<br>ที่ลงทะเบียนกับทางหอพักไว้</div>
  </div>
</div>

<div id="screen-bill">
  <div class="topbar">
    <div>
      <div class="topbar-room" id="tb-room">ห้อง —</div>
      <div class="topbar-name" id="tb-name"></div>
    </div>
    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
  </div>
  <div id="connBanner" style="display:none" class="conn-banner">

  <div id="newBillBanner" style="display:none" class="notif-banner" onclick="this.style.display='none'">
    🔔 <span id="newBillMsg">มีบิลใหม่จากเจ้าของหอ!</span>
    <span style="margin-left:auto;font-size:11px;opacity:.7">แตะเพื่อปิด</span>
  </div>
  <div class="content">
    <div class="month-selector">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.05em">เลือกเดือน</div>
      <div class="month-tabs" id="monthTabs"><div style="color:var(--muted);font-size:13px;padding:4px">กำลังโหลด...</div></div>
      <button class="load-more" id="loadMoreBtn" style="display:none" onclick="loadMoreBills()">โหลดบิลเก่ากว่านี้</button>
    </div>
    <div id="bill-content"></div>
  </div>
</div>

<!-- Receipt Modal -->
<div id="receiptModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);z-index:300;align-items:flex-start;justify-content:center;
  padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch">
  <div style="background:#fff;border-radius:20px;max-width:720px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto" class="receipt-box">
    <div id="receiptContent" style="padding:20px"></div>
    <div style="padding:0 20px 20px;display:flex;gap:8px;flex-wrap:wrap" class="no-print">
      <button onclick="printReceipt()" style="flex:1;min-width:80px;padding:11px;border-radius:10px;background:#0ea5e9;color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">🖨️ พิมพ์</button>
      <button id="dlReceiptBtn" onclick="downloadReceipt(event)" style="flex:1;min-width:80px;padding:11px;border-radius:10px;background:#059669;color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">⬇️ โหลด PDF</button>
      <button onclick="closeReceipt()" style="flex:1;min-width:60px;padding:11px 16px;border-radius:10px;background:#f1f5f9;color:#334155;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">ปิด</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="tenantToast" style="display:none;position:fixed;top:62px;left:50%;transform:translateX(-50%);
  z-index:999;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;
  font-family:'Sarabun',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.12);
  min-width:260px;text-align:center;transition:opacity .3s"></div>

<script>
// ============================================================
// CONFIG & GLOBALS
// ============================================================
const SUPA_URL = 'https://mdnupimieldwqrgxczgu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kbnVwaW1pZWxkd3FyZ3hjemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODQwNDAsImV4cCI6MjA4Nzg2MDA0MH0.r_z0eYczkO4DfElyU0eVK4CFXQx7r_EmwCepQKhMUQM';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Pagination
const BILLS_PAGE_SIZE = 12;

// State
let currentTenant = null;
let currentBill   = null;
let currentPays   = [];
let allBills      = [];
let billDetailCache = {};
let realtimeChannel = null;
let realtimeRetryTimer = null;
let realtimeRetryCount = 0;
let slipFile = null;
let billsOffset = 0;
let billsHasMore = false;

// Login rate-limit (client-side; complement to server)
const LOGIN_LOCK_KEY = 'login_lockout';
const LOGIN_TRIES_KEY = 'login_tries';
const MAX_LOGIN_TRIES = 5;
const LOCKOUT_MS = 5 * 60 * 1000; // 5 นาที

// ============================================================
// FORMATTER
// ============================================================
const _nf = new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2 });
const fmt = n => _nf.format(parseFloat(n) || 0);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// Sanitize URL — block javascript:, data: (except images), etc.
function safeUrl(u) {
  if (!u) return '';
  const s = String(u).trim();
  if (/^(https?:|\/)/i.test(s)) return s;
  // อนุญาตเฉพาะ data:image
  if (/^data:image\//i.test(s)) return s;
  return '';
}

// ============================================================
// SESSION RESTORE
// ============================================================
(function restoreSession() {
  const saved = sessionStorage.getItem('saved_tenant') || localStorage.getItem('saved_tenant');
  if (!saved) return;
  try {
    const parsed = JSON.parse(saved);
    // Validate basic shape
    if (!parsed || !parsed.id || !parsed.room) {
      localStorage.removeItem('saved_tenant');
      sessionStorage.removeItem('saved_tenant');
      return;
    }
    currentTenant = parsed;
    showBillScreen();
  } catch(e) {
    localStorage.removeItem('saved_tenant');
    sessionStorage.removeItem('saved_tenant');
  }
})();

// ============================================================
// PAGE LIFECYCLE — clean up realtime + polling
// ============================================================
window.addEventListener('beforeunload', () => { cleanupRealtime(); stopPolling(); });
window.addEventListener('pagehide', () => { cleanupRealtime(); stopPolling(); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && currentTenant) {
    if (!realtimeChannel) startRealtime();
    // Poll ทันทีเมื่อกลับมาเปิดแอป — สำคัญสำหรับ Android (background = realtime ขาด)
    pollBillUpdates();
    startPolling();
  } else if (document.visibilityState === 'hidden') {
    stopPolling();
  }
});

function cleanupRealtime() {
  if (realtimeRetryTimer) { clearTimeout(realtimeRetryTimer); realtimeRetryTimer = null; }
  if (realtimeChannel) {
    try { sb.removeChannel(realtimeChannel); } catch(e) {}
    realtimeChannel = null;
  }
}

// ============================================================
// POLLING FALLBACK — กันกรณี realtime หาย
// ============================================================
let pollTimer = null;
const POLL_INTERVAL_NORMAL = 60000;  // 60 วิ ปกติ
const POLL_INTERVAL_PENDING = 15000; // 15 วิ ถ้ามีบิลรอยืนยัน (paid status)

function startPolling() {
  stopPolling();
  if (!currentTenant) return;
  // เลือกช่วงเวลาตามสถานะบิล — ถ้ามีบิลรอยืนยัน poll ถี่ขึ้น
  const hasPaidBill = allBills.some(b => b.status === 'paid');
  const interval = hasPaidBill ? POLL_INTERVAL_PENDING : POLL_INTERVAL_NORMAL;
  pollTimer = setInterval(pollBillUpdates, interval);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollBillUpdates() {
  if (!currentTenant || document.visibilityState !== 'visible') return;
  try {
    // ดึงเฉพาะ status + updated_at ของทุกบิล (เบามาก)
    const { data, error } = await sb.from('bills')
      .select('id,status,total')
      .eq('tenant_id', currentTenant.id);
    if (error || !data) return;

    let changed = false;
    data.forEach(fresh => {
      const idx = allBills.findIndex(b => b.id === fresh.id);
      if (idx === -1) {
        // มีบิลใหม่ที่ยังไม่อยู่ใน list
        changed = true;
        return;
      }
      const old = allBills[idx];
      if (old.status !== fresh.status || old.total !== fresh.total) {
        changed = true;
        // โชว์ toast ถ้า status เปลี่ยนเป็น confirmed
        if (old.status !== 'confirmed' && fresh.status === 'confirmed') {
          showToast('✅ เจ้าของหอยืนยันรับชำระแล้ว!', 'ok');
        } else if (old.status !== 'partial' && fresh.status === 'partial') {
          showToast('💧 ยืนยันชำระบางส่วนแล้ว', 'ok');
        }
        allBills[idx] = { ...old, ...fresh };
        invalidateBill(fresh.id);
      }
    });

    if (changed) {
      // ถ้าบิลที่กำลังดูเปลี่ยน → reload detail
      if (currentBill?.id) await selectBill(currentBill.id);
      renderMonthTabs();
      // ปรับ polling rate ถ้าสถานะเปลี่ยน
      startPolling();
    }
  } catch(e) {
    console.warn('Poll failed:', e);
  }
}

// ============================================================
// PHONE FORMAT
// ============================================================
function fmtPhone(input) {
  let v = input.value.replace(/\D/g,'').substring(0,10);
  let f = '';
  for (let i = 0; i < v.length; i++) { if(i===3||i===6) f+='-'; f+=v[i]; }
  input.value = f;
}

// ============================================================
// LOGIN — rate limited + validated
// ============================================================
function isLockedOut() {
  const until = parseInt(localStorage.getItem(LOGIN_LOCK_KEY) || '0', 10);
  return until && Date.now() < until ? until : 0;
}

function recordFailedLogin() {
  const tries = parseInt(localStorage.getItem(LOGIN_TRIES_KEY) || '0', 10) + 1;
  localStorage.setItem(LOGIN_TRIES_KEY, String(tries));
  if (tries >= MAX_LOGIN_TRIES) {
    localStorage.setItem(LOGIN_LOCK_KEY, String(Date.now() + LOCKOUT_MS));
    localStorage.removeItem(LOGIN_TRIES_KEY);
  }
}

function clearLoginCounters() {
  localStorage.removeItem(LOGIN_TRIES_KEY);
  localStorage.removeItem(LOGIN_LOCK_KEY);
}

async function doLogin() {
  // Client-side lockout check (เร็ว, แต่ bypass ได้ — มี server-side ด้วย)
  const lockedUntil = isLockedOut();
  if (lockedUntil) {
    const mins = Math.ceil((lockedUntil - Date.now()) / 60000);
    showLoginErr(`พยายามเข้าระบบมากเกินไป กรุณารอ ${mins} นาที`);
    return;
  }

  const phoneRaw  = document.getElementById('login-phone').value.trim();
  const roomInput = document.getElementById('login-room').value.trim().toUpperCase();
  if (!phoneRaw || !roomInput) { showLoginErr('กรุณากรอกเบอร์โทรและเลขห้อง'); return; }

  const cleanPhone = phoneRaw.replace(/-/g,'');
  if (!/^\d{9,10}$/.test(cleanPhone)) { showLoginErr('รูปแบบเบอร์โทรไม่ถูกต้อง'); return; }
  if (!/^[A-Z0-9]{1,10}$/.test(roomInput)) { showLoginErr('เลขห้องไม่ถูกต้อง'); return; }

  const identifier = `${cleanPhone}_${roomInput}`;

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';

  try {
    // 1. เช็ค server-side rate limit (สำคัญสุด — กัน brute force จริง)
    const { data: allowed, error: rpcErr } = await sb.rpc('check_login_allowed', {
      p_identifier: identifier
    });
    if (rpcErr) {
      // ถ้า RPC ไม่มี ให้ผ่านไปก่อน (graceful fallback) แต่ log ไว้
      console.warn('rate limit RPC unavailable:', rpcErr.message);
    } else if (allowed === false) {
      showLoginErr('พยายามเข้าระบบมากเกินไป กรุณารอ 15 นาที');
      return;
    }

    // 2. Query tenant
    const { data, error } = await sb.from('tenants')
      .select('id,name,room,phone,address,created_at')
      .ilike('room', roomInput)
      .limit(10);

    if (error) throw error;

    const tenant = (data||[]).find(t => (t.phone||'').replace(/-/g,'') === cleanPhone);

    // 3. บันทึก attempt ฝั่ง server (ทั้งสำเร็จและล้มเหลว)
    sb.from('login_attempts').insert({
      identifier: identifier.substring(0, 50),
      success: !!tenant
    }).then(() => {}, () => {}); // fire-and-forget

    if (!tenant) {
      recordFailedLogin();
      showLoginErr('เบอร์โทรหรือเลขห้องไม่ถูกต้อง');
      return;
    }

    clearLoginCounters();
    currentTenant = tenant;
    sessionStorage.setItem('saved_tenant', JSON.stringify(tenant));
    showBillScreen();
  } catch (e) {
    showLoginErr('ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่');
  } finally {
    btn.disabled = false; btn.innerHTML = '🔐 เข้าสู่ระบบ';
  }
}

function showLoginErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', 4000);
}

// BILL SCREEN
// ============================================================
function showBillScreen() {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-bill').style.display = 'block';
  document.getElementById('tb-room').textContent = 'ห้อง ' + (currentTenant.room||'—');

// ============================================================
// LOAD BILLS — paginated
// ============================================================
async function loadAllBills() {
  billsOffset = 0;
  const { data, error } = await sb.from('bills')
    .select('id,tenant_id,room,tenant_name,month_label,total,status,issued_at')
    .eq('tenant_id', currentTenant.id)
    .order('issued_at', { ascending: false })
    .range(0, BILLS_PAGE_SIZE - 1);

  if (error) {
    document.getElementById('bill-content').innerHTML =
      `<div class="empty"><div style="font-size:40px;margin-bottom:10px;opacity:.3">⚠️</div>
       <div style="font-family:'Prompt',sans-serif;font-size:17px;margin-bottom:6px">โหลดข้อมูลไม่ได้</div>
       <div style="font-size:13px">กรุณาตรวจสอบการเชื่อมต่อ</div>
       <button class="btn btn-primary" style="margin-top:14px" onclick="loadAllBills()">ลองใหม่</button></div>`;
    return;
  }

  allBills = data || [];
  billsOffset = allBills.length;
  billsHasMore = allBills.length === BILLS_PAGE_SIZE;
  document.getElementById('loadMoreBtn').style.display = billsHasMore ? 'block' : 'none';
  renderMonthTabs();

  if (!allBills.length) {
    document.getElementById('bill-content').innerHTML =
      `<div class="empty"><div style="font-size:40px;margin-bottom:10px;opacity:.3">📭</div>
       <div style="font-family:'Prompt',sans-serif;font-size:17px;margin-bottom:6px">ยังไม่มีบิล</div>
       <div style="font-size:13px">รอรับบิลจากผู้ดูแลหอพัก</div></div>`;
    return;
  }

  const active = allBills.find(b => b.status==='pending' || b.status==='partial') || allBills[0];
  await selectBill(active.id);
}

async function loadMoreBills() {
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true; btn.textContent = 'กำลังโหลด...';
  const { data, error } = await sb.from('bills')
    .select('id,tenant_id,room,tenant_name,month_label,total,status,issued_at')
    .eq('tenant_id', currentTenant.id)
    .order('issued_at', { ascending: false })
    .range(billsOffset, billsOffset + BILLS_PAGE_SIZE - 1);
  btn.disabled = false; btn.textContent = 'โหลดบิลเก่ากว่านี้';
  if (error || !data) return;
  // Dedup
  const existing = new Set(allBills.map(b => b.id));
  const newOnes = data.filter(b => !existing.has(b.id));
  allBills = allBills.concat(newOnes);
  billsOffset += data.length;
  billsHasMore = data.length === BILLS_PAGE_SIZE;
  btn.style.display = billsHasMore ? 'block' : 'none';
  renderMonthTabs();
}

function renderMonthTabs() {
  const tabs = document.getElementById('monthTabs');
  if (!allBills.length) {
    tabs.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:4px">ยังไม่มีบิล</div>';
    return;
  }
  const sortedBills = [...allBills].sort((a, b) => new Date(b.issued_at) - new Date(a.issued_at));
  tabs.innerHTML = sortedBills.map(b => {
    const isPending = b.status==='pending' || b.status==='partial';
    const isActive  = currentBill && currentBill.id === b.id;
    return `<div class="month-tab${isActive?' active':''}${isPending&&!isActive?' has-pending':''}" data-bill-id="${esc(b.id)}">${esc(b.month_label)}</div>`;
  }).join('');
  // Bind events (avoid inline onclick with templated id)
  tabs.querySelectorAll('.month-tab').forEach(el => {
    el.addEventListener('click', () => selectBill(el.dataset.billId));
  });
}

// ============================================================
// SELECT BILL
// ============================================================
async function selectBill(billId) {
  const billMeta = allBills.find(b => b.id === billId);
  if (!billMeta) return;
  const prevBillId = currentBill?.id;
  currentBill = billMeta;
  if (prevBillId !== billId) renderMonthTabs();

  if (billDetailCache[billId]) {
    const { bill, pays } = billDetailCache[billId];
    currentBill = bill;
    currentPays = pays;
    renderBill(bill, pays);
    return;
  }

  const [billRes, paysRes] = await Promise.all([
    sb.from('bills').select('*').eq('id', billId).single(),
    sb.from('payments').select('*').eq('bill_id', billId).order('paid_at')
  ]);

  const bill = billRes.data;
  const pays = paysRes.data || [];
  if (!bill) {
    showToast('โหลดบิลไม่สำเร็จ', 'danger');
    return;
  }

  billDetailCache[billId] = { bill, pays };
  currentBill = bill;
  currentPays = pays;
  renderBill(bill, pays);
}

function invalidateBill(billId) {
  delete billDetailCache[billId];
}

// ============================================================
// RENDER BILL
// ============================================================
const PILL_MAP = {
  pending:   ['hp-pending',   '⏳ รอชำระ'],
  partial:   ['hp-partial',   '💧 ชำระบางส่วน'],
  paid:      ['hp-paid',      '📤 รอยืนยัน'],
  confirmed: ['hp-confirmed', '✅ ยืนยันแล้ว'],
};

function amtRow(name, detail, amount, cls) {
  return `<div class="amt-row"><div class="al"><span class="an">${esc(name)}</span><span class="ad">${esc(detail)}</span></div><span class="ap ${cls}">${fmt(amount)} บาท</span></div>`;
}

function renderBill(b, pays) {
  const verifiedTotal = pays.filter(p => p.status==='verified').reduce((s,p) => s+(p.amount||0), 0);
  const remaining     = Math.max(0, (b.total||0) - verifiedTotal);
  const [pcls, ptxt]  = PILL_MAP[b.status] || ['hp-pending', esc(b.status||'')];

  const parts = [];

  parts.push(`<div class="bill-hero">
    <div class="hero-month">ประจำเดือน ${esc(b.month_label)}</div>
    <div class="hero-amount">${fmt(b.total)}<span style="font-size:22px;font-weight:600"> บาท</span></div>

  parts.push(`<div class="card" style="animation-delay:.05s"><div class="card-head"><div class="cdot" style="background:var(--elec)"></div><span class="card-title">รายละเอียดค่าใช้จ่าย</span></div>`);
  if (b.rent  > 0) parts.push(amtRow('🏠 ค่าห้องพัก', 'ประจำเดือน '+(b.month_label||''), b.rent,  'r'));

  if (b.elec  > 0) parts.push(amtRow('⚡ ค่าไฟ',      'ใช้ไป '+(b.elec_units||0)+' หน่วย',  b.elec,  'e'));
  if (b.fine  > 0) parts.push(amtRow('⚠️ ค่าปรับ',   b.fine_reason||'',                      b.fine,  'f'));
  parts.push(`<div class="grand-row"><span class="gl">💰 รวมทั้งสิ้น</span><span class="ga">${fmt(b.total)} บาท</span></div>`);
  if (verifiedTotal > 0)
    parts.push(`<div style="margin-top:8px;font-size:12px;color:var(--ok);text-align:right">✅ ชำระแล้ว ${fmt(verifiedTotal)} บาท</div>`);

    parts.push(`<div class="remaining-box"><div style="font-size:12px;color:var(--muted)">ยังค้างชำระ</div><div style="font-family:'Prompt',sans-serif;font-size:18px;font-weight:800;color:var(--danger)">${fmt(remaining)} บาท</div></div>`);
  else if (remaining <= 0 && verifiedTotal > 0)
    parts.push(`<div class="remaining-box done"><div style="font-size:12px;color:var(--ok)">ชำระครบแล้ว ✅</div><div style="font-family:'Prompt',sans-serif;font-size:18px;font-weight:800;color:var(--ok)">${fmt(b.total)} บาท</div></div>`);
  parts.push('</div>');

  const qrSafe = safeUrl(b.payment_qr);

    parts.push(`<div class="card" style="animation-delay:.1s"><div class="card-head"><div class="cdot" style="background:var(--ok)"></div><span class="card-title">💳 ช่องทางชำระเงิน</span></div>`);
    if (hasQr)
      parts.push(`<div style="text-align:center;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:8px">QR พร้อมเพย์</div><img src="${esc(qrSafe)}" class="qr-img" loading="lazy" alt="QR Code"><div style="font-size:11px;color:var(--muted);margin-top:6px">สแกนด้วย Mobile Banking</div></div>`);
    if (hasQr && hasBank)
      parts.push(`<div style="height:1px;background:var(--border);margin:12px 0"></div>`);
    if (hasBank)
      parts.push(`<div class="bank-box"><div class="brow"><span class="bk">ธนาคาร</span><span class="bv">${esc(b.bank_name||'—')}</span></div><div class="bank-num" id="bnum">${esc(b.bank_number||'—')}</div><div class="brow" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span class="bk">ชื่อบัญชี</span><span class="bv">${esc(b.bank_account_name||'—')}</span></div><button class="copy-btn" onclick="copyBankNum()">📋 คัดลอกเลขบัญชี</button></div>`);

      <div style="display:flex;flex-direction:column;gap:10px">

        <div class="fg" style="margin-bottom:0"><label>หมายเหตุ (ไม่บังคับ)</label><input type="text" id="pay-note" placeholder="เช่น โอนบางส่วน" maxlength="200"></div>
        <div><label style="display:block;margin-bottom:6px">สลิปการโอนเงิน</label>

            <div id="uploadPlaceholder"><div style="font-size:28px;margin-bottom:6px">📎</div><div style="font-size:13px;color:var(--muted)">คลิกเพื่อเลือกรูปสลิป</div><div style="font-size:11px;color:var(--muted);margin-top:3px">PNG, JPG ไม่เกิน 5MB</div></div>
            <img id="slipPreview" style="display:none" class="upload-preview" alt="สลิป">

        </div>
        <button class="btn btn-success btn-full" id="submitPayBtn" onclick="submitPayment('${esc(b.id)}', ${remaining})">📤 ส่งหลักฐานการชำระ</button>

  } else if (b.status === 'confirmed') {
    parts.push(`<div class="card" style="animation-delay:.15s;border-color:#bbf7d0;background:#f0fdf4">

        <div style="font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--ok)">ยืนยันการชำระแล้ว</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">เจ้าของหอยืนยันรับชำระเรียบร้อย</div>
        <button onclick="openReceipt(currentBill,currentPays)" style="margin-top:12px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">🧾 ดูใบเสร็จ</button>
      </div></div>`);
  } else if (remaining <= 0) {
    parts.push(`<div class="card" style="animation-delay:.15s;border-color:#fed7aa;background:#fff7ed">
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:36px;margin-bottom:8px">📤</div>
        <div style="font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--warn)">รอเจ้าของหอยืนยัน</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">ระบบได้รับสลิปแล้ว รอการยืนยัน</div>
      </div></div>`);
  }

  if (pays.length) {
    parts.push(`<div class="card" style="animation-delay:.2s"><div class="card-head"><div class="cdot" style="background:var(--muted)"></div><span class="card-title">ประวัติการชำระ</span></div>`);
    pays.forEach(p => {
      const pillCls = p.status==='verified' ? 'pv' : p.status==='rejected' ? 'pr' : 'pp';
      const pillTxt = p.status==='verified' ? '✅ ยืนยัน' : p.status==='rejected' ? '❌ ปฏิเสธ' : '🔍 รอตรวจ';
      const slipSafe = safeUrl(p.slip_url);
      parts.push(`<div class="ph-item"><div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-weight:700;font-size:15px">${fmt(p.amount)} บาท</div>
        <div style="font-size:11px;color:var(--muted)">${esc(new Date(p.paid_at).toLocaleString('th-TH'))}</div>
        ${p.note ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(p.note)}</div>` : ''}
        </div><span class="pill ${pillCls}">${pillTxt}</span></div>
        ${slipSafe ? `<img src="${esc(slipSafe)}" data-slip="${esc(slipSafe)}" style="max-width:100%;border-radius:9px;margin-top:8px;max-height:160px;object-fit:contain;cursor:pointer" loading="lazy" alt="สลิปการโอน">` : ''}

  document.getElementById('bill-content').innerHTML = parts.join('');
  // Bind slip image click handlers (avoid inline JS with URLs)

    img.addEventListener('click', () => window.open(img.dataset.slip, '_blank', 'noopener'));
  });

// ============================================================
// SLIP UPLOAD
// ============================================================
function handleSlip(e) {
  const f = e.target.files[0]; if (!f) return;
  // ยอมรับทุก image type (รวม HEIC จาก iPhone) — เดี๋ยวจะ compress ลงเป็น JPEG ก่อนอัพ
  if (!f.type.startsWith('image/')) {
    alert('กรุณาเลือกไฟล์รูปภาพเท่านั้น');
    e.target.value = ''; return;
  }
  // Limit 15MB ก่อน compress (compress แล้วจะเหลือ ~500KB-1MB)
  if (f.size > 15*1024*1024) {
    alert('รูปใหญ่เกิน 15MB กรุณาเลือกรูปที่เล็กกว่า'); e.target.value = ''; return;
  }
  slipFile = f;

  // แสดง preview (HEIC แสดงไม่ได้ใน <img> แต่อัพได้ — จะ compress เป็น JPEG ก่อน)
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('uploadPlaceholder').style.display = 'none';
    const img = document.getElementById('slipPreview');
    img.onerror = () => {
      // HEIC หรือ format ที่ browser แสดงไม่ได้ — แสดง placeholder แทน
      img.style.display = 'none';
      const ph = document.getElementById('uploadPlaceholder');
      ph.innerHTML = `<div style="font-size:28px;margin-bottom:6px">✅</div>
        <div style="font-size:13px;color:var(--ok);font-weight:700">เลือกรูปแล้ว: ${esc(f.name)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:3px">${(f.size/1024/1024).toFixed(2)} MB</div>`;
      ph.style.display = 'block';
    };
    img.src = ev.target.result; img.style.display = 'block';

  };
  r.onerror = () => alert('อ่านไฟล์ไม่ได้ กรุณาลองรูปอื่น');
  r.readAsDataURL(f);
}

// ============================================================
// ============================================================
// IMAGE COMPRESSION — ลดขนาดสลิปก่อนอัพ
// รูปจากกล้องมือถือมักจะ 3-8MB, resize ลงเหลือ ~500KB
// ============================================================
async function compressImage(file, maxDim = 1600, quality = 0.85) {
  // ถ้าเล็กกว่า 1MB ไม่ต้อง compress (ประหยัดเวลา)
  if (file.size < 1024 * 1024) return file;

  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = () => reject(new Error('อ่านไฟล์รูปไม่ได้'));

    img.onload = () => {
      try {
        let { width, height } = img;
        // คำนวณขนาดใหม่ ไม่เกิน maxDim ที่ด้านยาวสุด
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob(blob => {
          if (!blob) { reject(new Error('แปลงรูปไม่ได้')); return; }
          // สร้าง File object ใหม่ (Supabase ต้องการ name + type)
          const compressed = new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {
            type: 'image/jpeg',
            lastModified: Date.now()
          });
          resolve(compressed);
        }, 'image/jpeg', quality);
      } catch (err) { reject(err); }
    };
    img.onerror = () => reject(new Error('โหลดรูปไม่ได้ อาจเป็นไฟล์เสีย'));

    reader.readAsDataURL(file);
  });
}

// ============================================================
// SUBMIT PAYMENT — compress + better errors + retry-friendly
// ============================================================
async function submitPayment(billId, maxRemaining) {
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const note   = document.getElementById('pay-note').value.trim().substring(0, 200);

  if (!amount || amount <= 0) { alert('กรุณากรอกจำนวนเงินที่ถูกต้อง'); return; }
  if (amount > maxRemaining + 0.01) { alert(`ยอดต้องไม่เกินค้างชำระ ${fmt(maxRemaining)} บาท`); return; }
  if (!slipFile) { alert('กรุณาแนบสลิปการโอนเงิน'); return; }

  const btn = document.getElementById('submitPayBtn');
  btn.disabled = true; btn.textContent = 'กำลังย่อรูป...';

  let uploadedPath = null;
  try {
    // 1. Compress image (รูปจากมือถือมักจะใหญ่)
    let fileToUpload;
    try {
      fileToUpload = await compressImage(slipFile, 1600, 0.85);
    } catch (compressErr) {
      console.warn('Compress failed, using original:', compressErr);
      fileToUpload = slipFile; // fallback ถ้า compress พัง
    }

    // 2. ถ้ายังใหญ่เกิน 5MB ลอง compress อีกรอบด้วย quality ต่ำกว่า
    if (fileToUpload.size > 5 * 1024 * 1024) {
      try {
        fileToUpload = await compressImage(slipFile, 1200, 0.7);
      } catch(e) {}
    }
    if (fileToUpload.size > 5 * 1024 * 1024) {
      throw new Error('รูปใหญ่เกินไปแม้หลังย่อแล้ว กรุณาเลือกรูปอื่น');
    }

    // 3. Upload (ใช้ชื่อไฟล์ที่ปลอดภัย ไม่มีภาษาไทย/อักขระพิเศษ)
    btn.textContent = 'กำลังอัปโหลด...';
    const ext = 'jpg'; // หลัง compress = jpg เสมอ (ถ้าไม่ compress ใช้ jpg ได้เพราะ Supabase ไม่ตรวจ)
    const safeBillId = String(billId).replace(/[^a-zA-Z0-9-]/g, '');
    const path = `slips/${safeBillId}_${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;

    const { error: upErr } = await sb.storage.from('slips').upload(path, fileToUpload, {
      cacheControl: '3600',
      upsert: false,
      contentType: fileToUpload.type || 'image/jpeg' // ระบุชัดเจน
    });

    if (upErr) {
      // แปล error เป็นภาษาไทยที่เข้าใจ
      const msg = (upErr.message || '').toLowerCase();
      if (msg.includes('bucket') && msg.includes('not found')) {
        throw new Error('ระบบยังไม่ได้สร้าง storage bucket "slips" กรุณาแจ้งเจ้าของหอ');
      }
      if (msg.includes('row-level security') || msg.includes('policy')) {
        throw new Error('ไม่มีสิทธิ์อัพโหลด กรุณาแจ้งเจ้าของหอตั้งค่า storage policy');
      }
      if (msg.includes('payload too large') || msg.includes('size')) {
        throw new Error('ไฟล์ใหญ่เกินขีดจำกัด กรุณาเลือกรูปที่เล็กกว่า');
      }
      if (msg.includes('mime') || msg.includes('type')) {
        throw new Error('ประเภทไฟล์ไม่รองรับ กรุณาเลือก JPG หรือ PNG');
      }
      if (msg.includes('network') || msg.includes('failed to fetch')) {
        throw new Error('การเชื่อมต่อขาด กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่');
      }
      throw new Error('อัพโหลดสลิปไม่สำเร็จ: ' + upErr.message);
    }
    uploadedPath = path;
    const slipUrl = sb.storage.from('slips').getPublicUrl(path).data.publicUrl;

    // 4. Insert payment
    btn.textContent = 'กำลังบันทึก...';
    const { error: payErr } = await sb.from('payments').insert({
      bill_id: billId, amount, slip_url: slipUrl, note, status: 'pending_verify'
    });
    if (payErr) {
      const msg = (payErr.message || '').toLowerCase();
      if (msg.includes('row-level security') || msg.includes('policy')) {
        throw new Error('บันทึกไม่ได้ — RLS policy ไม่อนุญาต กรุณาแจ้งเจ้าของหอ');
      }
      throw new Error('บันทึกการชำระไม่สำเร็จ: ' + payErr.message);
    }

    // 5. Notification + bill status (parallel, non-blocking)
    await Promise.allSettled([
      sb.from('notifications').insert({
        type: 'payment_submitted', bill_id: billId,
        message: `ห้อง ${currentTenant.room} — ${currentTenant.name} ส่งหลักฐานชำระ ${amount.toLocaleString('th-TH')} บาท`
      }),
      sb.from('bills').update({ status: 'paid' }).eq('id', billId)
    ]);

    // Success
    slipFile = null;
    invalidateBill(billId);
    const idx = allBills.findIndex(b => b.id === billId);
    if (idx !== -1) allBills[idx] = { ...allBills[idx], status: 'paid' };
    await selectBill(billId);
    renderMonthTabs();
    showToast('✅ ส่งหลักฐานสำเร็จ! รอเจ้าของหอยืนยัน', 'ok');

  } catch (e) {
    // Cleanup orphan slip
    if (uploadedPath) {
      sb.storage.from('slips').remove([uploadedPath]).catch(()=>{});
    }
    console.error('Submit payment error:', e);
    alert(e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
  } finally {
    btn.disabled = false; btn.innerHTML = '📤 ส่งหลักฐานการชำระ';
  }
}

// ============================================================
// REALTIME — with auto-reconnect + exponential backoff
// ============================================================
function startRealtime() {
  cleanupRealtime();
  if (!currentTenant) return;

  realtimeChannel = sb.channel('tenant-' + currentTenant.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'bills', filter:'tenant_id=eq.'+currentTenant.id },
      async () => {
        showToast('📋 มีบิลใหม่จากเจ้าของหอ!', 'info');
        document.getElementById('newBillMsg').textContent = 'มีบิลใหม่จากเจ้าของหอ! กรุณาตรวจสอบ';
        document.getElementById('newBillBanner').style.display = 'flex';
        await loadAllBills();
      })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'bills', filter:'tenant_id=eq.'+currentTenant.id },
      async payload => {
        const s = payload.new.status;
        if (s==='confirmed') showToast('✅ เจ้าของหอยืนยันรับชำระแล้ว!', 'ok');
        else if (s==='partial') showToast('💧 ยืนยันชำระบางส่วนแล้ว', 'ok');

        const idx = allBills.findIndex(b => b.id === payload.new.id);
        if (idx !== -1) allBills[idx] = { ...allBills[idx], ...payload.new };
        invalidateBill(payload.new.id);
        if (currentBill?.id === payload.new.id) await selectBill(payload.new.id);
        renderMonthTabs();
      })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'payments' },
      async payload => {
        // Only handle payments for current tenant's bills
        if (!allBills.some(b => b.id === payload.new.bill_id)) return;
        if (payload.new.status === 'verified') showToast('✅ สลิปได้รับการยืนยัน!', 'ok');
        else if (payload.new.status === 'rejected') showToast('❌ สลิปถูกปฏิเสธ กรุณาส่งใหม่', 'danger');
        if (payload.new.bill_id) invalidateBill(payload.new.bill_id);
        if (currentBill?.id === payload.new.bill_id) await selectBill(currentBill.id);
      })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        realtimeRetryCount = 0;
        document.getElementById('connBanner').style.display = 'none';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        scheduleReconnect();
      }
    });
}

function scheduleReconnect() {
  if (realtimeRetryTimer) return;
  realtimeRetryCount = Math.min(realtimeRetryCount + 1, 6);
  const delay = Math.min(1000 * Math.pow(2, realtimeRetryCount - 1), 30000);
  document.getElementById('connMsg').textContent = `การเชื่อมต่อขาด — ลองใหม่ใน ${Math.round(delay/1000)} วินาที`;
  document.getElementById('connBanner').style.display = 'flex';
  realtimeRetryTimer = setTimeout(() => {
    realtimeRetryTimer = null;
    if (currentTenant) startRealtime();
  }, delay);
}

function genReceiptNo(billId) {
  const hash = billId ? parseInt(billId.replace(/-/g,'').substring(0,8),16) : Math.floor(Math.random()*9000)+1000;
  return String((hash%9000)+1000).padStart(4,'0');
}

// แปลงตัวเลขเป็นข้อความไทย — รองรับถึงล้าน
function numToThaiText(num) {
  num = Math.round(parseFloat(num) || 0);
  if (num === 0) return 'ศูนย์บาทถ้วน';

  const ones = ['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  const positions = ['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];

  function readGroup(n) {
    // อ่านตัวเลข 1-999999
    if (n === 0) return '';
    let result = '';
    const s = String(n);
    const len = s.length;
    for (let i = 0; i < len; i++) {
      const d = parseInt(s[i], 10);
      const pos = len - 1 - i; // 0=หน่วย, 1=สิบ, ...
      if (d === 0) continue;
      if (pos === 0) {
        // หลักหน่วย
        if (d === 1 && len > 1 && s[len-2] !== '0') result += 'เอ็ด';
        else result += ones[d];
      } else if (pos === 1) {
        // หลักสิบ
        if (d === 1) result += 'สิบ';
        else if (d === 2) result += 'ยี่สิบ';
        else result += ones[d] + 'สิบ';
      } else {
        result += ones[d] + positions[pos];
      }
    }
    return result;
  }

  let text = '';
  if (num >= 1000000) {
    const millions = Math.floor(num / 1000000);
    text += readGroup(millions) + 'ล้าน';
    num = num % 1000000;
  }
  if (num > 0) text += readGroup(num);

  return text + 'บาทถ้วน';
}

      เอกสารออกโดยระบบอัตโนมัติ • ${esc(fullReceiptNo)} • ${esc(dateStr)}</div>
  </div>`;
  document.getElementById('receiptModal').style.display = 'flex';
}

const closeReceipt = () => { document.getElementById('receiptModal').style.display='none'; };
const printReceipt = () => { window.print(); };

// ============================================================
// PDF GENERATION — preload libs สำหรับเร็วขึ้น
// ============================================================
let _pdfLibsPromise = null;
function preloadPdfLibs() {
  if (_pdfLibsPromise) return _pdfLibsPromise;
  _pdfLibsPromise = Promise.all([
    window.html2canvas ? Promise.resolve() : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
    window.jspdf        ? Promise.resolve() : loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
  ]).catch(err => { _pdfLibsPromise = null; throw err; });
  return _pdfLibsPromise;
}

async function downloadReceipt(ev) {
  const btn = (ev && ev.target) || document.getElementById('dlReceiptBtn');
  const originalText = btn.textContent;
  btn.textContent='กำลังโหลด...'; btn.disabled=true;

  const el = document.getElementById('receiptContent');
  const originalWidth = el.style.width;
  const originalMaxWidth = el.style.maxWidth;

  try {
    // 1. โหลด libs (น่าจะ preload ไว้แล้วตอนเปิด modal)
    await preloadPdfLibs();

    btn.textContent = 'กำลังสร้าง PDF...';

    // 2. บังคับ render ที่ 720px เพื่อ layout desktop
    el.style.width = '720px';
    el.style.maxWidth = '720px';
    await new Promise(r => setTimeout(r, 30));

    // 3. ลด scale = 1.5 (เดิม 2) — เร็วขึ้น 40%, คุณภาพยังดี
    const canvas = await html2canvas(el, {
      scale: 1.5,
      backgroundColor: '#ffffff',
      useCORS: true,
      windowWidth: 720,
      width: 720,
      logging: false,
      // ปิด features ที่ไม่จำเป็น = เร็วขึ้น
      removeContainer: true,
      imageTimeout: 5000
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 12;
    const usableW = pageW - margin * 2;
    const usableH = pageH - margin * 2;

    const imgRatio = canvas.height / canvas.width;
    let imgW = usableW;
    let imgH = imgW * imgRatio;
    if (imgH > usableH) {
      imgH = usableH;
      imgW = imgH / imgRatio;
    }

    const offsetX = (pageW - imgW) / 2;
    const offsetY = margin;

    // JPEG quality 0.85 — เล็กลง 70% เทียบกับ PNG, มองด้วยตาแทบไม่ต่าง
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.85), 'JPEG', offsetX, offsetY, imgW, imgH);
    pdf.save(`ใบเสร็จ_RC${genReceiptNo(currentBill?.id)}_ห้อง${currentBill?.room||''}_${currentBill?.month_label||''}.pdf`);
  } catch(e) {
    console.error('PDF error:', e);
    alert('โหลด PDF ไม่สำเร็จ กรุณาใช้ปุ่มพิมพ์แทน');
  } finally {
    el.style.width = originalWidth;
    el.style.maxWidth = originalMaxWidth;
    btn.textContent = originalText || '⬇️ โหลด PDF'; btn.disabled = false;
  }
}

function loadScript(src) {
  return new Promise((res,rej) => {
    const s = document.createElement('script');
    s.src=src; s.onload=res; s.onerror=()=>rej(new Error('Load failed: '+src));
    document.head.appendChild(s);
  });
}
