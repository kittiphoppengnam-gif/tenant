<style>
:root{
  --bg:#f0f4f8;--surf:#ffffff;--surf2:#f8fafc;--surf3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --water:#0284c7;--elec:#d97706;--rent:#7c3aed;
  --ok:#059669;--warn:#ea580c;--danger:#dc2626;
  --text:#0f172a;--muted:#64748b;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(2,132,199,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 10% 90%,rgba(124,58,237,.04) 0%,transparent 60%)}
#screen-login{display:flex;align-items:center;justify-content:center;padding:20px;
  position:fixed;inset:0;z-index:100;background:var(--bg)}
#screen-login.hidden{display:none}
#screen-bill{display:none;position:relative;z-index:1;min-height:100vh}
.login-box{background:var(--surf);border:1px solid var(--border);border-radius:24px;
  padding:36px 28px;max-width:380px;width:100%;animation:fadeUp .5s ease both;
  box-shadow:0 8px 40px rgba(0,0,0,.10)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icons{display:inline-flex;gap:6px;margin-bottom:12px}
.login-logo .icons span{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ico-w{background:rgba(2,132,199,.1)}.ico-e{background:rgba(217,119,6,.1)}
.login-logo h1{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.login-logo p{font-size:13px;color:var(--muted)}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em}
input,select{background:var(--surf2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;padding:11px 14px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,select:focus{border-color:var(--water);box-shadow:0 0 0 3px rgba(2,132,199,.1)}
input::placeholder{color:var(--muted)}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-bottom:10px;
  background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:9px;padding:9px;display:none}
.login-note{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.7}
.btn{padding:11px 20px;border-radius:11px;border:none;font-family:'Prompt',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s;
  display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;box-shadow:0 3px 14px rgba(2,132,199,.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 3px 14px rgba(5,150,105,.3)}
.btn-success:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--surf2);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surf3)}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.topbar{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 16px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.topbar-room{font-family:'Prompt',sans-serif;font-size:14px;font-weight:800;color:var(--water)}
.topbar-name{font-size:12px;color:var(--muted)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;
  font-size:12px;padding:5px 12px;border-radius:7px;transition:background .15s;font-family:'Sarabun',sans-serif}
.btn-logout:hover{background:var(--surf2)}
.notif-banner{background:#eff6ff;border-bottom:2px solid #bfdbfe;padding:12px 16px;
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#1d4ed8;
  cursor:pointer;animation:slideDown .4s ease}
.content{max-width:520px;margin:0 auto;padding:14px 14px 60px}
.month-selector{background:var(--surf);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.month-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--surf2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:'Prompt',sans-serif;white-space:nowrap}
.month-tab:hover{border-color:var(--water);color:var(--water)}
.month-tab.active{background:#eff6ff;border-color:var(--water);color:var(--water)}
.month-tab.has-pending{border-color:var(--elec);color:var(--elec);background:#fffbeb}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.05);animation:fadeUp .4s ease both}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cdot{width:8px;height:8px;border-radius:50%}
.card-title{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700}
.amt-row{display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--surf2);border:1px solid var(--border)}
.al{display:flex;flex-direction:column;gap:2px}
.an{font-size:13px;font-weight:600}.ad{font-size:11px;color:var(--muted)}
.ap{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700}
.ap.w{color:var(--water)}.ap.e{color:var(--elec)}.ap.r{color:var(--rent)}.ap.f{color:var(--danger)}
.grand-row{display:flex;justify-content:space-between;align-items:center;padding:13px;
  background:linear-gradient(135deg,rgba(2,132,199,.07),rgba(217,119,6,.05));
  border:1px solid rgba(2,132,199,.2);border-radius:12px;margin-top:10px}
.gl{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700}
.ga{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;
  background:linear-gradient(90deg,var(--water),var(--elec));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bill-hero{text-align:center;padding:24px 16px 16px}
.hero-month{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-family:'Prompt',sans-serif;font-size:48px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,#0284c7,#d97706);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:700;margin-top:10px;border:1px solid}
.hp-pending{background:#fffbeb;border-color:#fde68a;color:#92400e}
.hp-partial{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.hp-paid{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.hp-confirmed{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.remaining-box{border-radius:12px;padding:13px;margin-top:10px;
  display:flex;justify-content:space-between;align-items:center;background:#fef2f2;border:1px solid #fecaca}
.remaining-box.done{background:#f0fdf4;border-color:#bbf7d0}
.qr-img{max-width:180px;max-height:180px;border-radius:12px;border:2px solid var(--border);
  object-fit:contain;background:#fff;padding:6px;display:block;margin:0 auto}
.bank-box{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:13px}
.brow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.bk{color:var(--muted)}.bv{font-weight:700}
.bank-num{font-family:'Prompt',sans-serif;font-size:22px;font-weight:800;
  color:var(--elec);letter-spacing:.06em;text-align:center;padding:8px 0 4px}
.copy-btn{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);border-radius:8px;
  color:var(--elec);font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;
  width:100%;margin-top:8px;font-family:'Sarabun',sans-serif}
.copy-btn:hover{background:rgba(217,119,6,.15)}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;
  cursor:pointer;transition:border-color .2s,background .2s;background:var(--surf2)}
.upload-zone:hover,.upload-zone.has{border-color:rgba(5,150,105,.5)}
.upload-preview{max-width:100%;border-radius:10px;margin-top:10px;max-height:200px;object-fit:contain}
.ph-item{background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:8px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:18px;font-size:10px;font-weight:700;border:1px solid}
.pv{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
.pp{background:#f5f3ff;border-color:#ddd6fe;color:#5b21b6}
.pr{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
@media print{
  @page{size:A5 landscape;margin:10mm}
  body>*:not(#receiptModal){display:none!important}
  #receiptModal{display:block!important;position:static!important;background:#fff!important;padding:0!important}
  .receipt-box{box-shadow:none!important;border:none!important;max-width:100%!important;border-radius:0!important}
  .no-print{display:none!important}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">
      <div style="display:flex;justify-content:center;margin-bottom:12px">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0f172a,#1e293b);
          display:flex;align-items:center;justify-content:center;
          font-family:'Prompt',sans-serif;font-size:22px;font-weight:800;color:#ffffff;
          box-shadow:0 6px 20px rgba(15,23,42,.25);border:2px solid #e2e8f0">JR</div>
      </div>
      <h1>ระบบหอพัก</h1>
      <p>เข้าสู่ระบบเพื่อดูบิลค่าสาธารณูปโภค</p>
    </div>
    <div class="fg">
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="login-phone" placeholder="0xx-xxx-xxxx" maxlength="12"
        oninput="fmtPhone(this)" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fg">
      <label>เลขห้อง</label>
      <input type="text" id="login-room" placeholder="เช่น A3, B12, 101" maxlength="10"
        style="text-transform:uppercase" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">🔐 เข้าสู่ระบบ</button>
    <div class="login-note">ใช้เบอร์โทรและเลขห้อง<br>ที่ลงทะเบียนกับทางหอพักไว้</div>
  </div>
</div>

<div id="screen-bill">
  <div class="topbar">
    <div>
      <div class="topbar-room" id="tb-room">ห้อง —</div>
      <div class="topbar-name" id="tb-name"></div>
    </div>
    <button class="btn-logout" onclick="logout()" style="color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.05)">ออกจากระบบ</button>
  </div>
  <div id="newBillBanner" style="display:none" class="notif-banner" onclick="this.style.display='none'">
    🔔 <span id="newBillMsg">มีบิลใหม่จากเจ้าของหอ!</span>
    <span style="margin-left:auto;font-size:11px;opacity:.7">แตะเพื่อปิด</span>
  </div>
  <div class="content">
    <div class="month-selector">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.05em">เลือกเดือน</div>
      <div class="month-tabs" id="monthTabs"><div style="color:var(--muted);font-size:13px;padding:4px">กำลังโหลด...</div></div>
    </div>
    <div id="bill-content"></div>
  </div>
</div>

<div id="receiptModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;padding:12px">
  <div style="background:#fff;border-radius:20px;max-width:720px;width:100%;max-height:92vh;
    overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)" class="receipt-box">
    <div id="receiptContent" style="padding:24px"></div>
    <div style="padding:0 24px 20px;display:flex;gap:8px" class="no-print">
      <button onclick="printReceipt()" style="flex:1;padding:11px;border-radius:10px;background:#0ea5e9;color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">🖨️ พิมพ์</button>
      <button onclick="downloadReceipt()" style="flex:1;padding:11px;border-radius:10px;background:#059669;color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">⬇️ โหลด PDF</button>
      <button onclick="closeReceipt()" style="padding:11px 16px;border-radius:10px;background:#f1f5f9;color:#334155;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">ปิด</button>
    </div>
  </div>
</div>

<div id="tenantToast" style="display:none;position:fixed;top:62px;left:50%;transform:translateX(-50%);
  z-index:999;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;
  font-family:'Sarabun',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.12);
  min-width:260px;text-align:center;transition:opacity .4s"></div>

<script>
const SUPA_URL='https://mdnupimieldwqrgxczgu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kbnVwaW1pZWxkd3FyZ3hjemd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODQwNDAsImV4cCI6MjA4Nzg2MDA0MH0.r_z0eYczkO4DfElyU0eVK4CFXQx7r_EmwCepQKhMUQM';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentTenant=null,currentBill=null,currentPays=[],allBills=[],realtimeChannel=null,slipFile=null;

(function(){
  const saved=localStorage.getItem('saved_tenant');
  if(saved){try{currentTenant=JSON.parse(saved);
    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>showBillScreen());}
    else{showBillScreen();}
  }catch(e){localStorage.removeItem('saved_tenant');}}
})();

function fmtPhone(input){let v=input.value.replace(/\D/g,'').substring(0,10);let f='';for(let i=0;i<v.length;i++){if(i===3||i===6)f+='-';f+=v[i];}input.value=f;}
function fmt(n){return(parseFloat(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function doLogin(){
  const phone=document.getElementById('login-phone').value.trim();
  const roomInput=document.getElementById('login-room').value.trim().toUpperCase();
  if(!phone||!roomInput){showLoginErr('กรุณากรอกเบอร์โทรและเลขห้อง');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='กำลังตรวจสอบ...';
  const cleanPhone=phone.replace(/-/g,'');
  const{data,error}=await sb.from('tenants').select('*').limit(100);
  btn.disabled=false;btn.innerHTML='🔐 เข้าสู่ระบบ';
  if(error||!data?.length){showLoginErr('ไม่พบข้อมูล กรุณาติดต่อผู้ดูแล');return;}
  const tenant=data.find(t=>{
    const tp=(t.phone||'').replace(/-/g,'');
    const tr=(t.room||'').toUpperCase();
    return(tp===cleanPhone)&&(tr===roomInput);
  });
  if(!tenant){showLoginErr('เบอร์โทรหรือเลขห้องไม่ถูกต้อง');return;}
  currentTenant=tenant;
  localStorage.setItem('saved_tenant',JSON.stringify(tenant));
  showBillScreen();
}

function showLoginErr(msg){
  const el=document.getElementById('login-err');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

async function showBillScreen(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-login').classList.add('hidden');
  const bill=document.getElementById('screen-bill');
  bill.style.display='block';
  document.getElementById('tb-room').textContent='ห้อง '+(currentTenant.room||'—');
  document.getElementById('tb-name').textContent=currentTenant.name||'';
  await loadAllBills();
  startRealtime();
}

async function loadAllBills(){
  const{data}=await sb.from('bills').select('*').eq('tenant_id',currentTenant.id).order('issued_at',{ascending:false});
  allBills=data||[];
  renderMonthTabs();
  if(!allBills.length){
    document.getElementById('bill-content').innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:10px;opacity:.3">📭</div><div style="font-family:'Prompt',sans-serif;font-size:17px;margin-bottom:6px">ยังไม่มีบิล</div><div style="font-size:13px">รอรับบิลจากผู้ดูแลหอพัก</div></div>`;
    return;
  }
  const active=allBills.find(b=>b.status==='pending'||b.status==='partial')||allBills[0];
  await selectBill(active.id);
}

function renderMonthTabs(){
  const tabs=document.getElementById('monthTabs');
  if(!allBills.length){tabs.innerHTML='<div style="color:var(--muted);font-size:13px;padding:4px">ยังไม่มีบิล</div>';return;}
  tabs.innerHTML=allBills.map(b=>{
    const isPending=b.status==='pending'||b.status==='partial';
    const isActive=currentBill&&currentBill.id===b.id;
    return`<div class="month-tab ${isActive?'active':''} ${isPending&&!isActive?'has-pending':''}" onclick="selectBill('${b.id}')">${esc(b.month_label)}</div>`;
  }).join('');
}

async function selectBill(billId){
  const bill=allBills.find(b=>b.id===billId);if(!bill)return;
  currentBill=bill;renderMonthTabs();
  const{data:pays}=await sb.from('payments').select('*').eq('bill_id',billId).order('paid_at');
  currentPays=pays||[];renderBill(bill,currentPays);
}

function renderBill(b,pays){
  const verifiedTotal=pays.filter(p=>p.status==='verified').reduce((s,p)=>s+(p.amount||0),0);

  const pillMap={pending:['hp-pending','⏳ รอชำระ'],partial:['hp-partial','💧 ชำระบางส่วน'],paid:['hp-paid','📤 รอยืนยัน'],confirmed:['hp-confirmed','✅ ยืนยันแล้ว']};
  const[pcls,ptxt]=pillMap[b.status]||['hp-pending',b.status];
  let html=`<div class="bill-hero">
    <div class="hero-month">ประจำเดือน ${esc(b.month_label)}</div>
    <div class="hero-amount">${fmt(b.total)}<span style="font-size:22px;font-weight:600"> บาท</span></div>
    <div><span class="hero-pill ${pcls}">${ptxt}</span></div></div>`;
  html+=`<div class="card" style="animation-delay:.05s"><div class="card-head"><div class="cdot" style="background:var(--elec)"></div><span class="card-title">รายละเอียดค่าใช้จ่าย</span></div>`;

  if(b.water>0)html+=amtRow('💧 ค่าน้ำ','ใช้ไป '+(b.water_units||0)+' หน่วย',b.water,'w');
  if(b.elec >0)html+=amtRow('⚡ ค่าไฟ','ใช้ไป '+(b.elec_units||0)+' หน่วย',b.elec,'e');
  if(b.fine >0)html+=amtRow('⚠️ ค่าปรับ',b.fine_reason||'',b.fine,'f');
  html+=`<div class="grand-row"><span class="gl">💰 รวมทั้งสิ้น</span><span class="ga">${fmt(b.total)} บาท</span></div>`;
  if(verifiedTotal>0)html+=`<div style="margin-top:8px;font-size:12px;color:var(--ok);text-align:right">✅ ชำระแล้ว ${fmt(verifiedTotal)} บาท</div>`;

  else if(remaining<=0&&verifiedTotal>0)html+=`<div class="remaining-box done"><div style="font-size:12px;color:var(--ok)">ชำระครบแล้ว ✅</div><div style="font-family:'Prompt',sans-serif;font-size:18px;font-weight:800;color:var(--ok)">${fmt(b.total)} บาท</div></div>`;
  html+='</div>';
  const hasQr=!!b.payment_qr,hasBank=!!(b.bank_number||b.bank_name);
  if(hasQr||hasBank){
    html+=`<div class="card" style="animation-delay:.1s"><div class="card-head"><div class="cdot" style="background:var(--ok)"></div><span class="card-title">💳 ช่องทางชำระเงิน</span></div>`;
    if(hasQr)html+=`<div style="text-align:center;margin-bottom:10px"><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:8px">QR พร้อมเพย์</div><img src="${b.payment_qr}" class="qr-img"><div style="font-size:11px;color:var(--muted);margin-top:6px">สแกนด้วย Mobile Banking</div></div>`;
    if(hasQr&&hasBank)html+=`<div style="height:1px;background:var(--border);margin:12px 0"></div>`;
    if(hasBank)html+=`<div class="bank-box"><div class="brow"><span class="bk">ธนาคาร</span><span class="bv">${esc(b.bank_name||'—')}</span></div><div class="bank-num" id="bnum">${esc(b.bank_number||'—')}</div><div class="brow" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span class="bk">ชื่อบัญชี</span><span class="bv">${esc(b.bank_account_name||'—')}</span></div><button class="copy-btn" onclick="copyBankNum()">📋 คัดลอกเลขบัญชี</button></div>`;
    html+='</div>';

  if(b.status!=='confirmed'&&remaining>0){
    html+=`<div class="card" style="animation-delay:.15s"><div class="card-head"><div class="cdot" style="background:var(--rent)"></div><span class="card-title">📤 แจ้งชำระเงิน</span></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="fg" style="margin-bottom:0"><label>จำนวนเงินที่ชำระ (บาท)</label><input type="number" id="pay-amount" placeholder="${fmt(remaining)}" value="${remaining}"></div>
        <div class="fg" style="margin-bottom:0"><label>หมายเหตุ (ไม่บังคับ)</label><input type="text" id="pay-note" placeholder="เช่น โอนบางส่วน"></div>
        <div><label style="display:block;margin-bottom:6px">สลิปการโอนเงิน</label>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('slipInput').click()">
            <div id="uploadPlaceholder"><div style="font-size:28px;margin-bottom:6px">📎</div><div style="font-size:13px;color:var(--muted)">คลิกเพื่อเลือกรูปสลิป</div><div style="font-size:11px;color:var(--muted);margin-top:3px">PNG, JPG ไม่เกิน 5MB</div></div>
            <img id="slipPreview" style="display:none" class="upload-preview">
          </div>
          <input type="file" id="slipInput" accept="image/*" style="display:none" onchange="handleSlip(event)">

    html+=`<div class="card" style="animation-delay:.15s;border-color:#bbf7d0;background:#f0fdf4">
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:36px;margin-bottom:8px">✅</div>
        <div style="font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--ok)">ยืนยันการชำระแล้ว</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">เจ้าของหอยืนยันรับชำระเรียบร้อย</div>
        <button onclick="openReceipt(currentBill,currentPays)" style="margin-top:12px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:'Prompt',sans-serif;font-weight:700;font-size:13px;border:none;cursor:pointer">🧾 ดูใบเสร็จ</button>
      </div></div>`;
  }else if(remaining<=0){
    html+=`<div class="card" style="animation-delay:.15s;border-color:#fed7aa;background:#fff7ed">
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:36px;margin-bottom:8px">📤</div>
        <div style="font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--warn)">รอเจ้าของหอยืนยัน</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">ระบบได้รับสลิปแล้ว รอการยืนยัน</div>
      </div></div>`;
  }
  if(pays.length){
    html+=`<div class="card" style="animation-delay:.2s"><div class="card-head"><div class="cdot" style="background:var(--muted)"></div><span class="card-title">ประวัติการชำระ</span></div>`;
    pays.forEach(p=>{html+=`<div class="ph-item"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:700;font-size:15px">${fmt(p.amount)} บาท</div><div style="font-size:11px;color:var(--muted)">${new Date(p.paid_at).toLocaleString('th-TH')}</div>${p.note?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(p.note)}</div>`:''}</div><span class="pill ${p.status==='verified'?'pv':p.status==='rejected'?'pr':'pp'}">${p.status==='verified'?'✅ ยืนยัน':p.status==='rejected'?'❌ ปฏิเสธ':'🔍 รอตรวจ'}</span></div>${p.slip_url?`<img src="${p.slip_url}" style="max-width:100%;border-radius:9px;margin-top:8px;max-height:160px;object-fit:contain;cursor:pointer" onclick="window.open('${p.slip_url}','_blank')">`:''}</div>`;});
    html+='</div>';
  }
  document.getElementById('bill-content').innerHTML=html;
  slipFile=null;
}

function amtRow(name,detail,amount,cls){return`<div class="amt-row"><div class="al"><span class="an">${name}</span><span class="ad">${detail}</span></div><span class="ap ${cls}">${fmt(amount)} บาท</span></div>`;}

function handleSlip(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>5*1024*1024){alert('รูปใหญ่เกิน 5MB');return;}
  slipFile=f;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('uploadPlaceholder').style.display='none';const img=document.getElementById('slipPreview');img.src=ev.target.result;img.style.display='block';document.getElementById('uploadZone').classList.add('has');};
  r.readAsDataURL(f);
}

async function submitPayment(billId){
  const amount=parseFloat(document.getElementById('pay-amount').value);
  const note=document.getElementById('pay-note').value.trim();
  if(!amount||amount<=0){alert('กรุณากรอกจำนวนเงิน');return;}
  if(!slipFile){alert('กรุณาแนบสลิปการโอนเงิน');return;}
  const btn=document.getElementById('submitPayBtn');
  btn.disabled=true;btn.textContent='กำลังอัปโหลด...';
  let slipUrl='';
  try{
    const ext=slipFile.name.split('.').pop();
    const path=`slips/${billId}_${Date.now()}.${ext}`;
    const{error:upErr}=await sb.storage.from('slips').upload(path,slipFile);
    if(upErr)throw upErr;
    const{data:urlData}=sb.storage.from('slips').getPublicUrl(path);
    slipUrl=urlData.publicUrl;
  }catch(e){btn.disabled=false;btn.innerHTML='📤 ส่งหลักฐานการชำระ';alert('อัปโหลดสลิปไม่สำเร็จ: '+(e.message||e));return;}
  const{error}=await sb.from('payments').insert({bill_id:billId,amount,slip_url:slipUrl,note,status:'pending_verify'});
  if(error){btn.disabled=false;btn.innerHTML='📤 ส่งหลักฐานการชำระ';alert('เกิดข้อผิดพลาด: '+error.message);return;}
  const{data:allPays}=await sb.from('payments').select('*').eq('bill_id',billId);
  const verifiedAmt=(allPays||[]).filter(p=>p.status==='verified').reduce((s,p)=>s+(p.amount||0),0);
  const hasPending=(allPays||[]).some(p=>p.status==='pending_verify');
  // ถ้ามีสลิปรอตรวจ → รอยืนยัน (paid), ถ้าชำระบางส่วนแล้ว → partial
  let newStatus='partial';
  if(hasPending){newStatus='paid';}
  else if(verifiedAmt>=(currentBill?.total||0)){newStatus='paid';}
  await sb.from('bills').update({status:newStatus}).eq('id',billId);
  await sb.from('notifications').insert({type:'payment_submitted',bill_id:billId,message:`ห้อง ${currentTenant.room} — ${currentTenant.name} ส่งหลักฐานชำระ ${amount.toLocaleString('th-TH')} บาท`});
  slipFile=null;
  await loadAllBills();
}

function startRealtime(){
  if(realtimeChannel){sb.removeChannel(realtimeChannel);realtimeChannel=null;}
  realtimeChannel=sb.channel('tenant-'+currentTenant.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bills',filter:'tenant_id=eq.'+currentTenant.id},async()=>{
      showToast('📋 มีบิลใหม่จากเจ้าของหอ!','info');
      const b=document.getElementById('newBillBanner');
      document.getElementById('newBillMsg').textContent='มีบิลใหม่จากเจ้าของหอ! กรุณาตรวจสอบ';
      b.style.display='flex';
      await loadAllBills();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'bills',filter:'tenant_id=eq.'+currentTenant.id},async(payload)=>{
      const s=payload.new.status;
      if(s==='confirmed')showToast('✅ เจ้าของหอยืนยันรับชำระแล้ว!','ok');
      else if(s==='partial')showToast('💧 ยืนยันชำระบางส่วนแล้ว','ok');
      const{data}=await sb.from('bills').select('*').eq('tenant_id',currentTenant.id).order('issued_at',{ascending:false});
      allBills=data||[];
      const updated=allBills.find(b=>b.id===currentBill?.id);
      if(updated){currentBill=updated;const{data:p}=await sb.from('payments').select('*').eq('bill_id',updated.id).order('paid_at');currentPays=p||[];renderMonthTabs();renderBill(updated,currentPays);}
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'payments'},async(payload)=>{
      if(payload.new.status==='verified'){showToast('✅ สลิปได้รับการยืนยัน!','ok');if(currentBill)await selectBill(currentBill.id);}
      else if(payload.new.status==='rejected'){showToast('❌ สลิปถูกปฏิเสธ กรุณาส่งใหม่','danger');if(currentBill)await selectBill(currentBill.id);}
    })
    .subscribe();
}

function showToast(msg,type='info'){
  const el=document.getElementById('tenantToast');
  const styles={ok:'background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;',danger:'background:#fef2f2;border:1px solid #fecaca;color:#991b1b;',info:'background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;'};
  Object.assign(el.style,{display:'block',opacity:'1'});
  el.style.cssText+=styles[type]||styles.info;
  el.textContent=msg;
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',400);},4000);
}

function copyBankNum(){
  const num=document.getElementById('bnum')?.textContent;if(!num)return;
  navigator.clipboard.writeText(num).then(()=>{const btn=document.querySelector('.copy-btn');if(btn){btn.textContent='✅ คัดลอกแล้ว';setTimeout(()=>btn.textContent='📋 คัดลอกเลขบัญชี',2000);}});
}

function logout(){
  currentTenant=null;currentBill=null;allBills=[];currentPays=[];
  localStorage.removeItem('saved_tenant');
  if(realtimeChannel){sb.removeChannel(realtimeChannel);realtimeChannel=null;}
  document.getElementById('screen-bill').style.display='none';
  const login=document.getElementById('screen-login');

}

// RECEIPT
function genReceiptNo(billId){const hash=billId?parseInt(billId.replace(/-/g,'').substring(0,8),16):Math.floor(Math.random()*9000)+1000;return String(hash%9000+1000).padStart(4,'0');}
function numToThaiText(n){const ones=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'],tens=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];if(n===0)return'ศูนย์บาทถ้วน';let result='';const m=Math.round(n),th=Math.floor(m/1000),h=Math.floor((m%1000)/100),t=Math.floor((m%100)/10),o=m%10;if(th)result+=ones[th]+'พัน';if(h)result+=ones[h]+'ร้อย';if(t)result+=tens[t];if(o)result+=(t===1&&o===1?'เอ็ด':ones[o]);return result+'บาทถ้วน';}

  const tenant=currentTenant||{};
  const dateStr=now.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  const fullReceiptNo='RC'+String(now.getFullYear())+String(now.getMonth()+1).padStart(2,'0')+receiptNo;
  const invNo='INV'+String(now.getFullYear())+String(now.getMonth()+1).padStart(2,'0')+receiptNo;
  const rowItems=[];
  if(bill.rent >0)rowItems.push([`ค่าเช่าห้อง (Room rate) ${esc(bill.room)} เดือน ${esc(bill.month_label)}`,bill.rent]);

  if(bill.elec >0)rowItems.push([`ค่าไฟฟ้า (Electrical rate) เดือน ${esc(bill.month_label)} (หน่วยที่ใช้ = ${bill.elec_units||0} ยูนิต)`,bill.elec]);
  if(bill.fine >0)rowItems.push([`ค่าปรับ (Fine)${bill.fine_reason?' - '+bill.fine_reason:''}`,bill.fine]);
  const rowsHTML=rowItems.map(([desc,amt],i)=>`<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:7px 6px;text-align:center;color:#555">${i+1}</td><td style="padding:7px 6px">${desc}</td><td style="padding:7px 6px;text-align:right;font-weight:600;white-space:nowrap">${fmt(amt)}</td></tr>`).join('');
  document.getElementById('receiptContent').innerHTML=`
  <div style="font-family:'Sarabun',sans-serif;color:#111;font-size:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;border-bottom:2px solid #111;padding-bottom:8px">
      <div style="flex:1;padding-right:20px">
        <div style="font-weight:800;font-size:14px">${dormName}</div>
        ${dormAddress?`<div style="font-size:11px">${dormAddress}</div>`:''}
        ${dormOwner?`<div style="font-size:11px">เลขประจำตัวผู้เสียภาษี ${dormOwner}</div>`:''}
        ${dormPhone?`<div style="font-size:11px">โทร. ${dormPhone}</div>`:''}
        <div style="margin-top:7px"><span style="font-weight:800">ลูกค้า(Customer)</span>
          <div>${esc(bill.tenant_name)}</div>
          ${tenant.address?`<div style="font-size:11px">${esc(tenant.address)}</div>`:''}
          ${tenant.phone?`<div style="font-size:11px">โทร ${esc(tenant.phone)}</div>`:''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px">ใบเสร็จรับเงิน (Receipt)</div>
        <div style="font-size:11px"><div style="font-weight:700">ต้นฉบับ (Original)</div>
          <div>เลขที่(ID) ${fullReceiptNo}</div><div>วันที่(Date) ${dateStr}</div>
          <div>ห้อง(Room) ${esc(bill.room)}</div>
          ${dormSigner?`<div>พนักงาน(Staff) ${dormSigner}</div>`:''}
          <div>เลขที่อ้างอิง(Ref) ${invNo}</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div style="flex:1">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-top:2px solid #111;border-bottom:2px solid #111">
            <th style="padding:5px 6px;text-align:center;font-size:11px;width:30px">ลำดับ(#)</th>
            <th style="padding:5px 6px;text-align:left;font-size:11px">รายการชำระ (Description)</th>
            <th style="padding:5px 6px;text-align:right;font-size:11px;white-space:nowrap">ราคา(Price)</th>
          </tr></thead>
          <tbody>${rowsHTML}</tbody>
        </table>
        <div style="border-top:2px solid #111;padding-top:6px;margin-top:2px;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:11px;color:#555">(${numToThaiText(bill.total)})</div>
          <div style="text-align:right"><div style="font-weight:800;font-size:13px">จำนวนเงินรวมทั้งสิ้น (Total amount)</div>
            <div style="font-weight:800;font-size:16px">${fmt(bill.total)} บาท</div></div>
        </div>
      </div>
      <div style="width:190px;flex-shrink:0;border-left:1px dashed #ccc;padding-left:14px">
        <div style="font-weight:700;margin-bottom:4px">หมายเหตุ(Note)</div>
        <div style="font-size:11px;color:#555;min-height:28px;margin-bottom:18px">${bill.fine_reason||'-'}</div>
        <div style="margin-top:10px">
          <div style="font-size:11px">ลงชื่อ ......................................</div>
          <div style="font-size:11px;margin-top:8px">( ${dormSigner||'..............................'} )</div>
          <div style="font-size:11px;color:#555;margin-top:3px">ผู้รับเงิน</div>
        </div>
      </div>
    </div>
    <div style="border-top:1px dashed #bbb;margin-top:14px;padding-top:5px;text-align:center;font-size:10px;color:#aaa">
      เอกสารออกโดยระบบอัตโนมัติ • ${fullReceiptNo} • ${dateStr}</div>
  </div>`;
  document.getElementById('receiptModal').style.display='flex';
}

function closeReceipt(){document.getElementById('receiptModal').style.display='none';}
function printReceipt(){window.print();}

async function downloadReceipt(){
  const btn=event.target;btn.textContent='กำลังโหลด...';btn.disabled=true;
  try{
    if(!window.html2canvas)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    if(!window.jspdf)await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    const el=document.getElementById('receiptContent');
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const imgData=canvas.toDataURL('image/png');
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a5'});
    const pdfW=pdf.internal.pageSize.getWidth();
    pdf.addImage(imgData,'PNG',0,0,pdfW,(canvas.height*pdfW)/canvas.width);
    pdf.save(`ใบเสร็จ_RC${genReceiptNo(currentBill?.id)}_ห้อง${currentBill?.room||''}_${currentBill?.month_label||''}.pdf`);
  }catch(e){alert('โหลด PDF ไม่สำเร็จ กรุณาใช้ปุ่มพิมพ์แทน');}
  btn.textContent='⬇️ โหลด PDF';btn.disabled=false;
}

function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
</script>
